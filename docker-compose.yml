services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weathertracker}
      POSTGRES_USER: ${POSTGRES_USER:-weathertracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weathertracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
  build: ./backend
  env_file: .env
  depends_on:
    - db
  ports:
    - "8000:8000"
  volumes:
    - ./:/repo
    - ./backend:/app
    - ./data:/data
  restart: unless-stopped

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      - backend
    ports:
      - "7101:7101"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  pgdata:
